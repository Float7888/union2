<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1200" height="600" fill="url(#skyGradient)"/>
  
  <!-- City skyline -->
  <rect x="0" y="350" width="150" height="250" fill="url(#buildingGradient)"/>
  <rect x="80" y="320" width="120" height="280" fill="url(#buildingGradient)"/>
  <rect x="220" y="380" width="100" height="220" fill="url(#buildingGradient)"/>
  <rect x="340" y="300" width="140" height="300" fill="url(#buildingGradient)"/>
  <rect x="500" y="340" width="110" height="260" fill="url(#buildingGradient)"/>
  <rect x="630" y="310" width="130" height="290" fill="url(#buildingGradient)"/>
  <rect x="780" y="360" width="120" height="240" fill="url(#buildingGradient)"/>
  <rect x="920" y="330" width="100" height="270" fill="url(#buildingGradient)"/>
  <rect x="1040" y="350" width="160" height="250" fill="url(#buildingGradient)"/>
  
  <!-- Windows in buildings -->
  <rect x="20" y="370" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="35" y="370" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="50" y="390" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="100" y="340" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="115" y="360" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="130" y="340" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="250" y="400" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="265" y="420" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="370" y="320" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="385" y="340" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="400" y="320" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="530" y="360" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="545" y="380" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="660" y="330" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="675" y="350" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="690" y="330" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="810" y="380" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="825" y="400" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="950" y="350" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="965" y="370" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="1070" y="370" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="1085" y="390" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  <rect x="1100" y="370" width="8" height="12" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Labor union banner across buildings -->
  <rect x="200" y="220" width="800" height="40" fill="url(#bannerGradient)" opacity="0.9"/>
  <text x="600" y="245" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">SOLIDARITY</text>
  
  <!-- Factory smokestacks in background -->
  <rect x="50" y="250" width="20" height="100" fill="#6b7280"/>
  <rect x="150" y="200" width="25" height="150" fill="#6b7280"/>
  <rect x="1000" y="180" width="30" height="170" fill="#6b7280"/>
  
  <!-- Smoke from smokestacks -->
  <ellipse cx="60" cy="240" rx="15" ry="8" fill="#9ca3af" opacity="0.6"/>
  <ellipse cx="65" cy="230" rx="12" ry="6" fill="#9ca3af" opacity="0.4"/>
  <ellipse cx="162" cy="190" rx="18" ry="10" fill="#9ca3af" opacity="0.6"/>
  <ellipse cx="168" cy="180" rx="15" ry="8" fill="#9ca3af" opacity="0.4"/>
  <ellipse cx="1015" cy="170" rx="20" ry="12" fill="#9ca3af" opacity="0.6"/>
  <ellipse cx="1022" cy="160" rx="17" ry="9" fill="#9ca3af" opacity="0.4"/>
  
  <!-- Crane in construction -->
  <line x1="700" y1="150" x2="700" y2="400" stroke="#6b7280" stroke-width="8"/>
  <line x1="700" y1="150" x2="850" y2="200" stroke="#6b7280" stroke-width="6"/>
  <line x1="750" y1="165" x2="750" y2="190" stroke="#6b7280" stroke-width="4"/>
  
  <!-- Gears representing industry -->
  <circle cx="400" cy="120" r="25" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.7"/>
  <circle cx="440" cy="140" r="20" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>
  <circle cx="900" cy="100" r="30" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.7"/>
  
  <!-- Stars in the sky -->
  <circle cx="300" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="500" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="800" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="1100" cy="70" r="1.5" fill="white" opacity="0.6"/>
</svg>